<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Paige Curtis Photography</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital@0;1&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="accent-bar" aria-hidden="true"></div>
  <header class="site-header">
    <div class="header-inner">
      <a href="index.html" class="logo">
        <span class="logo-name">paige curtis</span>
        <span class="logo-tag">PHOTOGRAPHY | ART</span>
      </a>
      <button type="button" class="nav-toggle" aria-label="Open menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
      <nav class="main-nav">
        <a href="index.html">Home</a>
        <a href="portfolio.html">Portfolio</a>
        <a href="about.html">About Me</a>
        <a href="book.html">Book a Session</a>
      </nav>
    </div>
  </header>

  <main class="page-main">
    <section class="contact-intro">
      <h1 class="contact-page-title">Contact</h1>
      <p class="contact-intro-text">Ask any questions you have! If you're ready to look at sessions, go to <a href="book.html">Book a Session</a>.</p>
    </section>

    <section class="contact-layout">
      <div class="contact-image-col">
        <img src="images/contact-hero.jpg" alt="" class="contact-hero-img" onerror="this.style.background='linear-gradient(135deg,#2a2a2a,#1a1a1a)';this.minHeight='400px'" />
      </div>
      <div class="contact-form-col">
        <p class="contact-details">Oahu, Hawaii</p>
        <p class="contact-details">pagecurtisart@gmail.com | insta: pagecurtisphoto</p>
        <form class="contact-form" action="#" method="post">
          <div class="form-row">
            <label for="first">First Name</label>
            <input type="text" id="first" name="first" />
          </div>
          <div class="form-row">
            <label for="last">Last Name</label>
            <input type="text" id="last" name="last" />
          </div>
          <div class="form-row">
            <label for="email">Email <span class="required">*</span></label>
            <input type="email" id="email" name="email" required />
          </div>
          <div class="form-row">
            <label for="message">Message</label>
            <textarea id="message" name="message" rows="4"></textarea>
          </div>
          <button type="submit" class="btn btn-dark btn-send">Send</button>
        </form>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p>motion made art. | Paige Curtis Photography</p>
  </footer>

  <a href="inquiry.html" class="chat-fab" aria-label="Chat or contact">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
  </a>

  <script src="js/main.js"></script>
</body>
</html>
