<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inquiry | Paige Curtis Photography</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital@0;1&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="accent-bar" aria-hidden="true"></div>
  <header class="site-header">
    <div class="header-inner">
      <a href="index.html" class="logo">
        <span class="logo-name">paige curtis</span>
        <span class="logo-tag">PHOTOGRAPHY | ART</span>
      </a>
      <button type="button" class="nav-toggle" aria-label="Open menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
      <nav class="main-nav">
        <a href="index.html">Home</a>
        <a href="portfolio.html">Portfolio</a>
        <a href="about.html">About Me</a>
        <a href="book.html">Book a Session</a>
      </nav>
    </div>
  </header>

  <main class="page-main inquiry-page">
    <section class="inquiry-layout">
      <div class="inquiry-image-col">
        <img src="images/inquiry-hero.jpg" alt="" class="inquiry-hero-img" onerror="this.style.background='linear-gradient(135deg,#2a2a2a,#1a1a1a)';this.minHeight='400px'" />
      </div>
      <div class="inquiry-form-col">
        <p class="inquiry-details">Oahu, Hawaii</p>
        <p class="inquiry-details">pagecurtisart@gmail.com | insta: pagecurtisphoto</p>
        <p class="inquiry-required-note"><span class="required">*</span> Required</p>
        <!-- To receive submissions by email: sign up at formspree.io, create a form, and replace YOUR_FORM_ID below with your form ID. -->
        <form class="inquiry-form" action="https://formspree.io/f/YOUR_FORM_ID" method="post">
          <input type="hidden" name="_subject" value="New inquiry from Paige Curtis Photography" />
          <div class="form-row">
            <label for="inquiry-first">First Name</label>
            <input type="text" id="inquiry-first" name="first" />
          </div>
          <div class="form-row">
            <label for="inquiry-last">Last Name</label>
            <input type="text" id="inquiry-last" name="last" />
          </div>
          <div class="form-row">
            <label for="inquiry-email">Email <span class="required">*</span></label>
            <input type="email" id="inquiry-email" name="email" required />
          </div>
          <div class="form-row">
            <label for="inquiry-instagram">Instagram – let's put a face to the name!</label>
            <input type="text" id="inquiry-instagram" name="instagram" placeholder="@username" />
          </div>
          <div class="form-row">
            <span class="form-label">What kind of session are you looking for? <span class="required">*</span></span>
            <div class="form-radios">
              <label class="radio-label"><input type="radio" name="session_type" value="couples" required /> Couples</label>
              <label class="radio-label"><input type="radio" name="session_type" value="families" /> Families</label>
              <label class="radio-label"><input type="radio" name="session_type" value="individual" /> Individual</label>
              <label class="radio-label"><input type="radio" name="session_type" value="wedding" /> Wedding</label>
            </div>
          </div>
          <div class="form-row">
            <label for="inquiry-date">When were you looking to book? <span class="required">*</span></label>
            <input type="date" id="inquiry-date" name="booking_date" required />
          </div>
          <div class="form-row">
            <label for="inquiry-date-options">Have a couple date options? If so, list them here.</label>
            <textarea id="inquiry-date-options" name="date_options" rows="2" placeholder="e.g. June 15–20, or weekends in July"></textarea>
          </div>
          <div class="form-row">
            <label for="inquiry-about">Tell me a little bit about yourself! <span class="required">*</span></label>
            <textarea id="inquiry-about" name="about" rows="3" placeholder="Add answer here" required></textarea>
          </div>
          <div class="form-row">
            <label for="inquiry-vibe">If you'd like, tell me about the vibe you're looking for.</label>
            <textarea id="inquiry-vibe" name="vibe" rows="3" placeholder="Add answer here"></textarea>
          </div>
          <div class="form-row">
            <label for="inquiry-questions">Any other questions or comments?</label>
            <textarea id="inquiry-questions" name="questions" rows="3" placeholder="Add answer here"></textarea>
          </div>
          <button type="submit" class="btn btn-dark btn-send">Send</button>
        </form>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p>motion made art. | Paige Curtis Photography</p>
  </footer>

  <a href="inquiry.html" class="chat-fab" aria-label="Inquiry or contact">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
  </a>

  <script src="js/main.js"></script>
</body>
</html>
